<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연우애기사랑해요</title>

    <!-- CSS 연결 -->
    <link rel="stylesheet" href="냠냠냠.css">
</head>

<body>

    <div class="game-container">

        <!-- 점수 -->
        <div class="status">
            <div>
                점수 : <span id="score">0</span>
            </div>

            <div>
                시간 : <span id="timer">4</span>초
            </div>
        </div>


        <!-- 얼굴 공간 -->
        <div class="face-area">

            <!-- 메인 얼굴 -->
            <img 
                src="face1.png"
                id="main-face"
                class="main-face"
                alt="얼굴">

            <!-- 작은 얼굴 생성 공간 -->
            <div id="mini-face-container"></div>

        </div>


        <!-- 안내 문구 -->
        <h2 id="message">
            얼굴을 눌러 시작하세요!
        </h2>

    </div>


    <!-- JavaScript 연결 -->
    <script src="박연우.js"></script>

</body>

</html>
